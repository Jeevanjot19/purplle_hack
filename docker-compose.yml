version: "3.9"

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: storedb
      POSTGRES_USER: store
      POSTGRES_PASSWORD: store123
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U store -d storedb"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  cache:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://store:store123@db:5432/storedb
      REDIS_URL: redis://cache:6379
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health | grep -q healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    environment:
      API_URL: http://api:8000
      DATA_DIR: /data
      SPEED_FACTOR: "5.0"
    volumes:
      - ./data:/data:ro
      - ./pipeline:/pipeline
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - pipeline

  dashboard:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./nginx-default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
